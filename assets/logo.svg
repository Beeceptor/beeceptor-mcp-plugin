<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-labelledby="title desc">
  <title id="title">Beeceptor</title>
  <desc id="desc">Beeceptor API mocking plugin logo  a stylized bee with a network/API motif.</desc>

  <!-- Background -->
  <rect width="128" height="128" rx="22" fill="#1A1A2E"/>

  <!-- Body (abdomen) -->
  <ellipse cx="64" cy="76" rx="18" ry="24" fill="#F59E0B"/>
  <!-- Stripes -->
  <rect x="46" y="68" width="36" height="6" rx="3" fill="#1A1A2E" opacity="0.55"/>
  <rect x="46" y="80" width="36" height="6" rx="3" fill="#1A1A2E" opacity="0.55"/>

  <!-- Thorax -->
  <ellipse cx="64" cy="52" rx="13" ry="11" fill="#FBBF24"/>

  <!-- Head -->
  <circle cx="64" cy="38" r="10" fill="#FBBF24"/>

  <!-- Eyes -->
  <circle cx="60" cy="36" r="2.5" fill="#1A1A2E"/>
  <circle cx="68" cy="36" r="2.5" fill="#1A1A2E"/>

  <!-- Antennae -->
  <line x1="60" y1="29" x2="52" y2="20" stroke="#FBBF24" stroke-width="2" stroke-linecap="round"/>
  <circle cx="51" cy="19" r="2.5" fill="#F59E0B"/>
  <line x1="68" y1="29" x2="76" y2="20" stroke="#FBBF24" stroke-width="2" stroke-linecap="round"/>
  <circle cx="77" cy="19" r="2.5" fill="#F59E0B"/>

  <!-- Wings -->
  <ellipse cx="44" cy="52" rx="14" ry="8" fill="#E0F2FE" opacity="0.75" transform="rotate(-20 44 52)"/>
  <ellipse cx="84" cy="52" rx="14" ry="8" fill="#E0F2FE" opacity="0.75" transform="rotate(20 84 52)"/>
</svg>
